<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>iMonkey Official</title>

<style>

/* ===== الخلفية ===== */
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url("https://media.discordapp.net/attachments/1436022655789826068/1501561920753504369/rPgeQsSXGU.png?ex=69fc8603&is=69fb3483&hm=06721a876f5414e7803b54aee14bcad29e92528081953be1a23ecaa273aaab4f&=&format=webp&quality=lossless&width=1121&height=630") center/cover fixed;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* ===== Loading ===== */
#loading{
  position:fixed;
  inset:0;
  background:#0a0a0f;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loading img{
  width:120px;
  border-radius:50%;
  box-shadow:0 0 25px #ff6c6c;
  animation:float 2s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* ===== الموقع ===== */
#site{display:none;}

/* ===== NAVBAR ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(15,15,20,0.55);
  backdrop-filter:blur(15px);
  display:flex;
  justify-content:center;
  gap:12px;
  padding:12px;
  z-index:1000;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.nav-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px rgba(255, 108, 108, 0.4);
  border-color:#ff6c6ccb;
}

.nav-btn.active{
  background:linear-gradient(135deg,#ff6c6c,#ff5c5c);
  border:none;
  box-shadow:0 0 20px rgba(255, 108, 108, 0.6);
}

/* ===== Tabs ===== */
.tab{
  display:none;
  padding:100px 20px;
  text-align:center;
}

/* ===== Card ===== */
.card{
  background:rgba(20,20,25,0.6);
  backdrop-filter:blur(12px);
  padding:18px;
  border-radius:15px;
  max-width:900px;
  margin:auto;
  box-shadow:0 0 25px rgba(184,108,255,0.2);
}

/* ===== صور ===== */
.banner{
  width:100%;
  max-height:300px;
  object-fit:cover;
}

.logo{
  width:130px;
  border-radius:50%;
  margin-top:-60px;
  box-shadow:0 0 25px #b86cff;
}

/* ===== حالات ===== */
.online{color:#00ff88;}
.offline{color:#ff3b3b;}
.counter{color:#b86cff;font-size:20px;}

/* ===== Admin ===== */
#admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.box{
  background:#15151b;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  border-radius:8px;
  border:none;
}

button,a{
  cursor:pointer;
  padding:10px 15px;
  border-radius:10px;
  border:none;
  margin:5px;
  color:white;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- LOADING -->
<div id="loading">
  <img src="https://media.discordapp.net/attachments/1436022655789826068/1501561787856851106/8f1f2dfb4ce18c80a2b01255ed5652ae.webp?ex=69fc85e3&is=69fb3463&hm=4f4c4a883f2017bdfbd19a5a39d7ab0582b5e28a0342b00cedacb8f5c5380d6c&=&format=webp&width=381&height=381">
  <p>Loading iMonkey...</p>
</div>

<!-- SITE -->
<div id="site">

<!-- NAV -->
<nav>
  <button class="nav-btn active" onclick="setTab(this); show('home')">🏠 الرئيسية</button>
  <button class="nav-btn" onclick="setTab(this); show('live')">🔴 البث</button>
  <button class="nav-btn" onclick="setTab(this); show('social')">📱 التواصل</button>
  <button class="nav-btn" onclick="openAdmin()">⚙ الأدمن</button>
</nav>

<!-- HOME -->
<div id="home" class="tab" style="display:block;">

  <img class="banner"
  src="https://media.discordapp.net/attachments/1436022655789826068/1501561920753504369/rPgeQsSXGU.png">

  <img class="logo"
  src="https://media.discordapp.net/attachments/1436022655789826068/1501561787856851106/8f1f2dfb4ce18c80a2b01255ed5652ae.webp">

  <h1>🔥 iMonkey</h1>
  <p>Official Creator Website</p>

</div>

<!-- LIVE -->
<div id="live" class="tab">

  <div class="card">
    <h2>🔴 حالة البث</h2>

    <div id="status" class="offline">Loading...</div>

    <div class="counter">
      👀 المشاهدين: <span id="views">0</span>
    </div>

    <iframe
      src="https://kick.com/imonkey_d"
      width="100%"
      height="420"
      style="border:none;border-radius:10px;">
    </iframe>

  </div>

</div>

<!-- SOCIAL -->
<div id="social" class="tab">
  <div class="card">
    <h2>📱 التواصل</h2>

    <a style="background:#53fc18;color:black;" href="https://kick.com/imonkey_d">Kick</a>
    <a style="background:#000;" href="https://x.com/iimonkey_d?s=21">X</a>
    <a style="background:#5865F2;" href="https://discord.gg/imonkey">Discord</a>
    <a style="background:#FF0000;" href="https://youtube.com/@imonkey_d">YouTube</a>

  </div>
</div>

</div>

<!-- ADMIN -->
<div id="admin">
  <div class="box">

    <h3>Admin Panel</h3>

    <input id="pass" type="password" placeholder="Password">

    <br><br>

    <button onclick="login()" style="background:#ff786c;">دخول</button>
    <button onclick="closeAdmin()">إغلاق</button>

  </div>
</div>

<script>

/* Loading */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("site").style.display="block";
},2000);

/* Tabs */
function show(id){
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.getElementById(id).style.display='block';
}

/* Active nav */
function setTab(btn){
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* Admin */
function openAdmin(){
  document.getElementById("admin").style.display="flex";
}

function closeAdmin(){
  document.getElementById("admin").style.display="none";
}

function login(){
  let pass=document.getElementById("pass").value;
  if(pass==="imonkey511"){
    alert("✔ تم الدخول");
  }else{
    alert("❌ خطأ");
  }
}

/* Kick API */
async function getKick(){
  try{
    let res = await fetch("https://kick.com/api/v1/channels/imonkey_d");
    let data = await res.json();

    if(data.livestream && data.livestream.is_live){
      document.getElementById("status").innerHTML="🟢 LIVE الآن";
      document.getElementById("status").className="online";
      document.getElementById("views").innerText=data.livestream.viewer_count || 0;
    }else{
      document.getElementById("status").innerHTML="🔴 OFFLINE";
      document.getElementById("status").className="offline";
      document.getElementById("views").innerText=0;
    }

  }catch(e){
    document.getElementById("status").innerHTML="⚠ API Error";
  }
}

getKick();
setInterval(getKick,10000);

</script>

</body>
</html>
