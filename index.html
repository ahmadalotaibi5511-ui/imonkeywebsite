<style>
:root{
  --main:#940000;
}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:#0a0a0a;
  color:white;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:30px;
  background:#000;
  padding:15px;
  border-bottom:1px solid var(--main);
  z-index:999;
}

.navbar a{
  color:var(--main);
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
}

/* SECTIONS */
.section{display:none;padding-top:80px;}
.active{display:block;}

/* HOME */
.banner{height:260px;}
.banner img{width:100%;height:100%;object-fit:cover;}

.profile{
  display:flex;
  justify-content:center;
  margin-top:-40px;
}

.profile img{
  width:90px;
  height:90px;
  border-radius:20px;
  border:3px solid var(--main);
}

.center-text{
  text-align:center;
  margin:15px;
}

/* CARDS */
.cards{
  max-width:600px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px;
}

.card{
  height:120px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--main);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SOCIAL */
.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.social-card{
  display:flex;
  justify-content:space-between;
  background:#1a1a1a;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  color:white;
  text-decoration:none;
}

/* CHAT */
.chat{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.msg-box{
  height:300px;
  overflow:auto;
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:var(--main);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

  <button onclick="send()">إرسال</button>
  <button onclick="admin()">لوحة الإدارة</button>

<script>

/* 🔒 نظام يوزر ثابت */
let username = localStorage.getItem("username");
let locked = localStorage.getItem("usernameLocked");

window.onload = function(){

  if(!username){
    username = prompt("اختر اسمك (مرة واحدة فقط)");
    if(!username) username = "(username)";

    localStorage.setItem("username", username);
    localStorage.setItem("usernameLocked", "true");
  }

  if(locked === "true"){
    username = localStorage.getItem("username");
  }
};

/* NAV */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* كلمات محظورة */
const badWords = ["زق","تبن","خرا","كس","زب","كلب","حيوان","حمار"];
let banList = [];
let timeoutList = {};

/* فلترة */
function clean(text){
  badWords.forEach(w=>{
    text = text.replaceAll(w,"***");
  });
  return text;
}

/* CHAT */
function send(){

  let name = username;
  let msg = document.getElementById('msg').value;

  if(banList.includes(name)) return alert("انت موقوف");

  if(timeoutList[name] && timeoutList[name] > Date.now()){
    return alert("تايم اوت");
  }

  msg = clean(msg);

  let div = document.createElement('div');
  div.innerText = name + ": " + msg;

  document.getElementById('box').appendChild(div);

  document.getElementById('msg').value="";
}

/* ADMIN */
function admin(){

  let pass = prompt("كلمة المرور");

  if(pass !== "imonkey1elv") return alert("خطأ");

  let type = prompt("1-ban / 2-timeout");
  let user = prompt("اسم اللاعب");

  if(type=="1"){
    banList.push(user);
    alert("تم البان");
  }

  if(type=="2"){
    let min = prompt("كم دقيقة");
    timeoutList[user] = Date.now() + min*60000;
    alert("تم التايم اوت");
  }
}

</script>
